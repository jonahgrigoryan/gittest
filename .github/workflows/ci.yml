name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install deps
        run: |
          poetry install --with dev
          poetry run playwright install chromium
      - name: Lint & Test
        run: |
          poetry run ruff check .
          poetry run pytest -q